name: Daily prediction

on:
  schedule:
    # TWSE regular session closes 13:30 Asia/Taipei (UTC+8). Run a few minutes
    # later so the official daily bar can propagate to Yahoo/yfinance while you
    # still place orders near the closing print (not a guarantee — re-run from
    # Actions if the job fires before data lands).
    - cron: "35 5 * * 1-5"   # 05:35 UTC = 13:35 Taipei Mon–Fri
  workflow_dispatch:        # Allow manual runs from the Actions tab.
  push:
    branches: [ main ]      # Re-render on any code change.
    paths:
      - "pipeline/**"
      - "scripts/**"
      - ".github/workflows/daily.yml"

permissions:
  contents: write           # Required so the bot can push docs/ updates.

concurrency:
  group: daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 35   # Taiwan 50 + 0050 — faster than full S&P 500
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clear price cache
        run: rm -rf data_cache

      # If Yahoo lags, run_daily exits 0 and skips work (no commit). Locally omit
      # --exit-zero-if-eod-not-ready to fail fast (exit 2) when data is not ready.
      - name: Run daily prediction
        env:
          # Optional: override `pipeline.config.Config.live_portfolio_start` (ISO date).
          # Leave unset to use the default in code (currently first live fills on/after that date).
          LIVE_PORTFOLIO_START: ${{ vars.LIVE_PORTFOLIO_START }}
          # Optional: simulated starting bankroll (same units as prices, e.g. NTD for .TW).
          STARTING_CAPITAL: ${{ vars.STARTING_CAPITAL }}
          # Optional: `tw` (default Taiwan 50), `sp500`, or `core` (US mega-cap sleeve).
          UNIVERSE: ${{ vars.UNIVERSE }}
          # Optional: freeze OHLCV through this session (e.g. first GitHub publish as-of 5/13
          # while 5/14 is still open). Unset for normal "through latest Yahoo bar" runs.
          DATA_AS_OF: ${{ vars.DATA_AS_OF }}
        run: python scripts/run_daily.py --exit-zero-if-eod-not-ready

      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "daily: update predictions and tracker [skip ci]"
            git push
          fi
